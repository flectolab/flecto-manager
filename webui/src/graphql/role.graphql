query GetRolesWithPermissions {
  roles {
    code
    type
    resources {
      namespace
      project
      resource
      action
    }
    admin {
      section
      action
    }
  }
}

query SearchRoles($pagination: PaginationInput, $filter: RoleFilter!, $sort: [SortInput!]) {
  searchRoles(pagination: $pagination, filter: $filter, sort: $sort) {
    items {
      code
      type
      createdAt
      updatedAt
      resources {
        namespace
        project
        resource
        action
      }
      admin {
        section
        action
      }
    }
    total
    limit
    offset
  }
}

query GetRole($code: String!) {
  role(code: $code) {
    code
    type
    resources {
      namespace
      project
      resource
      action
    }
    admin {
      section
      action
    }
  }
}

mutation CreateRole($input: CreateRoleInput!) {
  createRole(input: $input) {
    code
    type
    createdAt
    updatedAt
    resources {
      namespace
      project
      resource
      action
    }
    admin {
      section
      action
    }
  }
}

mutation UpdateRole($code: String!, $input: UpdateRoleInput!) {
  updateRole(code: $code, input: $input) {
    code
    type
    createdAt
    updatedAt
    resources {
      namespace
      project
      resource
      action
    }
    admin {
      section
      action
    }
  }
}

mutation DeleteRole($code: String!) {
  deleteRole(code: $code)
}
